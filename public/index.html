<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>LOVE ZONE WEB</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
  <div id="wrap">
    <div id="game"></div>

    <!-- Toast -->
    <div id="toast" class="toast hidden toast-center">
      <div class="toastRow">
        <div id="toastIconL" class="toastIcon">🔔</div>
        <div class="toastBody">
          <div id="toastTitle" class="toastTitle">알림</div>
          <div id="toastText" class="toastText">텍스트</div>
        </div>
        <div id="toastIconR" class="toastIcon">🔔</div>
      </div>
    </div>

    <!-- Timer HUD -->
    <div id="timerHud" class="timerHud hidden">
      <div id="timerLabel" class="timerLabel">제한 시간</div>
      <div id="timerValue" class="timerValue">00:00</div>
    </div>

    <!-- Dialogue Box -->
    <div id="box" class="box hidden">
      <div id="boxTitle" class="boxTitle"></div>
      <div id="boxText" class="boxText"></div>
      <div id="boxChoices" class="boxChoices"></div>
      <div id="boxPrompt" class="boxPrompt hidden">▼</div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
